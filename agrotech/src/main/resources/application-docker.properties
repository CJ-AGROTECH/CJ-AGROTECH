# ===============================
# DOCKER ENVIRONMENT CONFIGURATION
# ===============================

# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8080
server.servlet.context-path=/

# ===============================
# POSTGRESQL (Services Docker)
# ===============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres-db}:${DB_PORT:5432}/${DB_NAME:agrotech_cj}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres_password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# MONGODB (Services Docker)
# ===============================
spring.data.mongodb.uri=mongodb://${MONGO_HOST:mongo-db}:${MONGO_PORT:27017}/${MONGO_DB:agrotech_telemetria}
spring.data.mongodb.host=${MONGO_HOST:mongo-db}
spring.data.mongodb.port=${MONGO_PORT:27017}
spring.data.mongodb.database=${MONGO_DB:agrotech_telemetria}

# ===============================
# OPEN-METEO
# ===============================
openmeteo.api.url=https://api.open-meteo.com/v1/forecast
openmeteo.location.lat=6.15
openmeteo.location.lon=-75.37

# ===============================
# JWT CONFIGURATION
# ===============================
app.jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidationPurposesOnly}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ===============================
# LOGGING CONFIGURATION
# ===============================
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.cj.agrotech=DEBUG
