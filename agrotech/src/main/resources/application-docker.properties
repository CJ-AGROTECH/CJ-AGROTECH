# ===============================
# DOCKER ENVIRONMENT CONFIGURATION
# ===============================

# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8080
server.servlet.context-path=/

# ===============================
# POSTGRESQL (Services Docker)
# ===============================
spring.datasource.url=jdbc:postgresql://postgres-db:5432/agrotech_cj
spring.datasource.username=postgres
spring.datasource.password=postgres_password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# MONGODB (Services Docker)
# ===============================
spring.data.mongodb.uri=mongodb://mongo-db:27017/agrotech_telemetria

# ===============================
# OPEN-METEO
# ===============================
openmeteo.api.url=https://api.open-meteo.com/v1/forecast
openmeteo.location.lat=6.15
openmeteo.location.lon=-75.37

# ===============================
# JWT CONFIGURATION
# ===============================
app.jwt.secret=mySecretKeyForJWTTokenGenerationAndValidationPurposesOnly
app.jwt.expiration=86400000
