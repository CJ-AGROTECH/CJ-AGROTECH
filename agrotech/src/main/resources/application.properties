spring.application.name=agrotech

# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/

# ===============================
# POSTGRESQL (Relational Database)
# ===============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:agrotech_cj}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway migration settings
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ===============================
# MONGODB (Time-Series Database)
# ===============================
spring.data.mongodb.uri=mongodb://${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_DB:agrotech_telemetria}
spring.data.mongodb.host=${MONGO_HOST:localhost}
spring.data.mongodb.port=${MONGO_PORT:27017}
spring.data.mongodb.database=${MONGO_DB:agrotech_telemetria}

# ===============================
# OPEN-METEO (Weather API)
# ===============================
openmeteo.api.url=https://api.open-meteo.com/v1/forecast
openmeteo.location.lat=6.15
openmeteo.location.lon=-75.37

# ===============================
# JWT CONFIGURATION
# ===============================
app.jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidationPurposesOnly}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ===============================
# LOGGING CONFIGURATION
# ===============================
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.cj.agrotech=DEBUG
